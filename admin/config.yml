backend:
  name: git-gateway
  branch: main

media_folder: "."
public_folder: "."

locale: en

collections:
  - name: "content"
    label: "🌐 Site Content"
    files:

      - name: "english"
        label: "🇬🇧 English"
        file: "_data/en.json"
        format: json
        fields:
          - { label: "Navigation – About",      name: "nav.about",      widget: string }
          - { label: "Navigation – Catchball",   name: "nav.catchball",  widget: string }
          - { label: "Navigation – Join",        name: "nav.join",       widget: string }
          - { label: "Navigation – Contact",     name: "nav.contact",    widget: string }
          - { label: "Hero – Subtitle",          name: "hero.subtitle",  widget: string }
          - { label: "Hero – Button 1",          name: "hero.cta1",      widget: string }
          - { label: "Hero – Button 2",          name: "hero.cta2",      widget: string }
          - { label: "Stats – Founded (number)", name: "stats.s1n",      widget: string }
          - { label: "Stats – Founded (label)",  name: "stats.s1l",      widget: string }
          - { label: "Stats – Members (number)", name: "stats.s2n",      widget: string }
          - { label: "Stats – Members (label)",  name: "stats.s2l",      widget: string }
          - { label: "Stats – Nationwide (number)", name: "stats.s3n",   widget: string }
          - { label: "Stats – Nationwide (label)",  name: "stats.s3l",   widget: string }
          - { label: "About – Section tag",      name: "about.label",    widget: string }
          - { label: "About – Title",            name: "about.title",    widget: string }
          - { label: "About – Paragraph",        name: "about.text",     widget: text }
          - { label: "About – Card headline",    name: "about.card.hl",  widget: string }
          - { label: "About – Card subtitle",    name: "about.card.sub", widget: string }
          - { label: "Catchball – Section tag",  name: "cb.label",       widget: string }
          - { label: "Catchball – Title",        name: "cb.title",       widget: string }
          - { label: "Catchball – Intro text",   name: "cb.text",        widget: text }
          - { label: "Catchball – Card 1 title", name: "cb.c1t",         widget: string }
          - { label: "Catchball – Card 1 text",  name: "cb.c1p",         widget: string }
          - { label: "Catchball – Card 2 title", name: "cb.c2t",         widget: string }
          - { label: "Catchball – Card 2 text",  name: "cb.c2p",         widget: string }
          - { label: "Catchball – Card 3 title", name: "cb.c3t",         widget: string }
          - { label: "Catchball – Card 3 text",  name: "cb.c3p",         widget: string }
          - { label: "Catchball – Card 4 title", name: "cb.c4t",         widget: string }
          - { label: "Catchball – Card 4 text",  name: "cb.c4p",         widget: string }
          - { label: "Join – Section tag",       name: "join.label",     widget: string }
          - { label: "Join – Title",             name: "join.title",     widget: string }
          - { label: "Join – Paragraph",         name: "join.text",      widget: text }
          - { label: "Join – Button",            name: "join.cta",       widget: string }
          - { label: "Contact – Section tag",    name: "contact.label",  widget: string }
          - { label: "Contact – Title",          name: "contact.title",  widget: string }
          - { label: "Contact – Name placeholder",    name: "contact.name",       widget: string }
          - { label: "Contact – Email placeholder",   name: "contact.email",      widget: string }
          - { label: "Contact – Message placeholder", name: "contact.msg",        widget: string }
          - { label: "Contact – Send button",    name: "contact.send",           widget: string }
          - { label: "Contact – Info title",     name: "contact.info.title",     widget: string }
          - { label: "Contact – Org label",      name: "contact.org.label",      widget: string }
          - { label: "Contact – Org name",       name: "contact.org.name",       widget: string }
          - { label: "Contact – Facebook page",  name: "contact.fb",             widget: string }
          - { label: "Footer – Rights text",     name: "footer.rights",          widget: string }

