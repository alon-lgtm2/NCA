          - { label: "צרי קשר – תווית ארגון",      name: "contact.org.label",  widget: string }
          - { label: "צרי קשר – שם ארגון",         name: "contact.org.name",   widget: string }
          - { label: "צרי קשר – עמוד פייסבוק",    name: "contact.fb",         widget: string }
          - { label: "פוטר – זכויות",              name: "footer.rights",      widget: string }

      - name: "dutch"
        label: "🇳🇱 Nederlands (Dutch)"
        file: "_data/nl.json"
        format: json
        fields:
          - { label: "Navigatie – Over ons",          name: "nav.about",          widget: string }
