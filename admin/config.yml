          - { label: "הצטרפי – כותרת",             name: "join.title",         widget: string }
          - { label: "הצטרפי – פסקה",              name: "join.text",          widget: text }
          - { label: "הצטרפי – כפתור",             name: "join.cta",           widget: string }
          - { label: "צרי קשר – תגית",             name: "contact.label",      widget: string }
          - { label: "צרי קשר – כותרת",            name: "contact.title",      widget: string }
